<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 - 简牍</title>
    <link rel="stylesheet" href="css/style.css?v=20260316">
    <style>
        body {
            background: #fdfcf8;
            min-height: 100vh;
        }
        .settings-container {
            max-width: 800px;
            margin: 60px auto;
            padding: 40px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .settings-header {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
        }
        .settings-title {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }
        .settings-subtitle {
            font-size: 14px;
            color: #64748b;
        }
        .setting-section {
            margin-bottom: 30px;
        }
        .section-label {
            font-size: 14px;
            font-weight: 600;
            color: #3d5a80;
            margin-bottom: 12px;
            display: block;
        }
        .setting-item {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.2s;
        }
        .setting-item:hover {
            border-color: #3d5a80;
            background: #f0f9ff;
        }
        .setting-item label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 10px;
        }
        .setting-item input,
        .setting-item select {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            background: white;
        }
        .setting-item input:focus,
        .setting-item select:focus {
            outline: none;
            border-color: #3d5a80;
            box-shadow: 0 0 0 3px rgba(61, 90, 128, 0.1);
        }
        .setting-desc {
            font-size: 12px;
            color: #64748b;
            margin-top: 8px;
            line-height: 1.5;
        }
        .btn-save {
            background: #3d5a80;
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: all 0.2s;
        }
        .btn-save:hover {
            background: #2c4a6b;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(61, 90, 128, 0.3);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #3d5a80;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }
        .status-ok {
            background: #dcfce7;
            color: #166534;
        }
        .status-error {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="settings-container">
        <a href="index.html" class="back-link">← 返回首页</a>
        
        <div class="settings-header">
            <h1 class="settings-title">⚙️ 系统设置</h1>
            <p class="settings-subtitle">配置 API、模型和其他偏好设置</p>
        </div>

        <form id="settingsForm">
            <!-- API Key 配置 -->
            <div class="setting-section">
                <label class="section-label">🔑 API 配置</label>
                
                <div class="setting-item">
                    <label for="apiKey">DeepSeek API Key</label>
                    <input type="password" id="apiKey" placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
                    <p class="setting-desc">
                        获取方式：访问 <a href="https://platform.deepseek.com" target="_blank">DeepSeek 平台</a> → 注册/登录 → API Keys → 创建新密钥
                    </p>
                    <div id="apiStatus" style="margin-top: 10px;"></div>
                </div>
            </div>

            <!-- 模型选择 -->
            <div class="setting-section">
                <label class="section-label">🤖 模型选择</label>
                
                <div class="setting-item">
                    <label for="modelSelect">AI 模型</label>
                    <select id="modelSelect">
                        <option value="deepseek-chat">DeepSeek Chat (默认)</option>
                        <option value="deepseek-coder">DeepSeek Coder (代码更强)</option>
                    </select>
                    <p class="setting-desc">
                        DeepSeek Chat 适合通用任务，Coder 适合复杂代码生成
                    </p>
                </div>
            </div>

            <!-- 高级设置 -->
            <div class="setting-section">
                <label class="section-label">🔧 高级设置</label>
                
                <div class="setting-item">
                    <label for="timeout">请求超时 (秒)</label>
                    <input type="number" id="timeout" value="60" min="10" max="300">
                    <p class="setting-desc">
                        AI 请求超时时间，复杂任务可以适当延长
                    </p>
                </div>

                <div class="setting-item">
                    <label for="maxFix">自动修复次数</label>
                    <input type="number" id="maxFix" value="3" min="1" max="5">
                    <p class="setting-desc">
                        AI 代码错误时自动尝试修复的次数
                    </p>
                </div>
            </div>

            <!-- 数据管理 -->
            <div class="setting-section">
                <label class="section-label">💾 数据管理</label>
                
                <div class="setting-item">
                    <label>历史记录</label>
                    <button type="button" onclick="clearHistory()" style="background: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px;">
                        🗑️ 清空历史记录
                    </button>
                    <p class="setting-desc">
                        删除所有本地保存的分析历史记录
                    </p>
                </div>

                <div class="setting-item">
                    <label>缓存数据</label>
                    <button type="button" onclick="clearCache()" style="background: #f59e0b; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px;">
                        🧹 清除缓存
                    </button>
                    <p class="setting-desc">
                        清除浏览器缓存，解决页面显示问题
                    </p>
                </div>
            </div>

            <button type="submit" class="btn-save">💾 保存设置</button>
        </form>
    </div>

    <script>
        // 加载保存的设置
        window.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('deepseek_api_key');
            const savedModel = localStorage.getItem('deepseek_model');
            const savedTimeout = localStorage.getItem('deepseek_timeout');
            const savedMaxFix = localStorage.getItem('deepseek_maxfix');

            if (savedKey) {
                document.getElementById('apiKey').value = savedKey;
                updateApiStatus(true);
            }
            if (savedModel) {
                document.getElementById('modelSelect').value = savedModel;
            }
            if (savedTimeout) {
                document.getElementById('timeout').value = savedTimeout;
            }
            if (savedMaxFix) {
                document.getElementById('maxFix').value = savedMaxFix;
            }
        });

        // 保存设置
        document.getElementById('settingsForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const apiKey = document.getElementById('apiKey').value.trim();
            const model = document.getElementById('modelSelect').value;
            const timeout = document.getElementById('timeout').value;
            const maxFix = document.getElementById('maxFix').value;

            if (!apiKey) {
                alert('请填写 API Key！');
                return;
            }

            localStorage.setItem('deepseek_api_key', apiKey);
            localStorage.setItem('deepseek_model', model);
            localStorage.setItem('deepseek_timeout', timeout);
            localStorage.setItem('deepseek_maxfix', maxFix);

            updateApiStatus(true);
            alert('✅ 设置已保存！\n\n现在可以返回首页开始分析了');
        });

        // 更新 API 状态显示
        function updateApiStatus(valid) {
            const statusDiv = document.getElementById('apiStatus');
            if (valid) {
                statusDiv.innerHTML = '<span class="status-badge status-ok">✓ 已保存</span>';
            } else {
                statusDiv.innerHTML = '<span class="status-badge status-error">✗ 未配置</span>';
            }
        }

        // 清空历史记录
        function clearHistory() {
            if (!confirm('确定要清空所有历史记录吗？\n\n此操作不可恢复！')) return;

            const DB_NAME = 'JianDuDB';
            const STORE_NAME = 'analysisHistory';

            const request = indexedDB.open(DB_NAME, 1);
            request.onsuccess = () => {
                const db = request.result;
                const tx = db.transaction([STORE_NAME], 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                store.clear();
                alert('✅ 历史记录已清空');
            };
        }

        // 清除缓存
        function clearCache() {
            if (!confirm('确定要清除浏览器缓存吗？\n\n页面将自动刷新')) return;

            caches.keys().then(names => {
                names.forEach(name => caches.delete(name));
            });
            localStorage.clear();
            alert('缓存已清除，页面将刷新');
            location.reload();
        }

        // 实时验证 API Key 格式
        document.getElementById('apiKey').addEventListener('input', (e) => {
            const key = e.target.value.trim();
            if (key.startsWith('sk-')) {
                updateApiStatus(true);
            } else {
                updateApiStatus(false);
            }
        });
    </script>
</body>
</html>
